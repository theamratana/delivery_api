# api.roluun.com + roluun.theamratana.com
# For native Flutter apps (Android, iOS, Windows/Desktop)
# DNS-only (no Cloudflare proxy) — direct connection to Spring Boot
server {
    listen 80;
    server_name api.roluun.com roluun.theamratana.com;

    # Increase body size for file uploads
    client_max_body_size 50M;

    location / {
        proxy_pass http://roluun-api:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
