# app.roluun.com
# Flutter Web app served as static files
# /api/* and /uploads/* proxied to Spring Boot — same-origin, no CORS needed
server {
    listen 80;
    server_name app.roluun.com;

    # Increase body size for file uploads
    client_max_body_size 50M;

    # Proxy API requests to Spring Boot (same origin — eliminates CORS)
    location /api/ {
        proxy_pass http://roluun-api:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Proxy uploaded media files from Spring Boot
    location /uploads/ {
        proxy_pass http://roluun-api:8081/uploads/;
        proxy_set_header Host $host;
    }

    # Serve Flutter Web static build
    location / {
        root /usr/share/nginx/flutter-web;
        index index.html;
        # Required for Flutter Web router (HTML5 history mode)
        try_files $uri $uri/ /index.html;
    }
}
