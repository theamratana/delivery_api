spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/deliverydb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:20000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:300000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME:1200000}
      leak-detection-threshold: ${DB_POOL_LEAK_THRESHOLD:60000}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:10MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:50MB}

  cache:
    cache-names: provinces,districts,pricingRules,userSessions
    caffeine:
      spec: maximumSize=5000,expireAfterWrite=4h,recordStats

server:
  port: ${SERVER_PORT:8081}
  address: 0.0.0.0
  tomcat:
    threads:
      max: ${TOMCAT_THREADS_MAX:100}
      min-spare: ${TOMCAT_THREADS_MIN_SPARE:50}
    max-http-post-size: ${TOMCAT_MAX_POST_SIZE:2097152}
    connection-timeout: ${TOMCAT_CONNECTION_TIMEOUT:20000}
    keep-alive-timeout: ${TOMCAT_KEEP_ALIVE_TIMEOUT:20000}

logging:
  level:
    com.delivery.deliveryapi.config.RequestLoggingFilter: INFO

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:8585454641:AAHmpA7V0trkot2KZEID5FOXOFKz8THBUn0}
  bot-username: ${TELEGRAM_BOT_USERNAME:RoluunBot}
  polling:
    enabled: ${TELEGRAM_POLLING_ENABLED:true}

jwt:
  secret: ${JWT_SECRET:dev-secret-change}
  issuer: ${JWT_ISSUER:delivery-api}
  access-exp-minutes: ${JWT_ACCESS_EXP_MINUTES:14400}
  refresh-exp-minutes: ${JWT_REFRESH_EXP_MINUTES:10080}
  dev-enabled: ${JWT_DEV_ENABLED:true}
